name: Deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: gjwabhyztjgqurirdwhx

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify Supabase Token
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is missing! Please add it to your GitHub Repository Secrets."
            exit 1
          fi

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy ml-predict --project-ref $SUPABASE_PROJECT_ID
          supabase functions deploy gamification --project-ref $SUPABASE_PROJECT_ID
          supabase functions deploy payment-simulation --project-ref $SUPABASE_PROJECT_ID

      - name: Force PostgREST schema cache reload
        run: |
          curl -s -X POST "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_ID/query" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"query": "NOTIFY pgrst, reload schema;"}'
